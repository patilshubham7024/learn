<!DOCTYPE html>
<html lang="en-UK">
	<head>
		
	</head>
	<body>
		<!-- Special type of text -->
		<p><b>This text is defined as bold</b></p>
		<p><strong>This text is defined as strong</strong></p>

		<p>
			<i>This text is italic.</i>
			<br>
			<em>This text is italic.</em>
		</p>
		
		<p><small>This is the small text</small></p><!-- Shows less importance -->
		<p><mark>This has been marked</mark></p>
		<p><del>Here is the deleted section.</del></p>
		<p><ins>This is inserted text</ins></p>
		<p>This is <sub>subscripted,</sub>. Do you have H<sub>2</sub>O?</p>
		<p>This is the <sup>example</sup> of <sup>superscript</sup></p>
	</body>
</html>
